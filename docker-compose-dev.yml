services:
  # ------------------------------------------------------------------
  # 1. INFRAESTRUCTURA Y BASES DE DATOS SEPARADAS
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis_bus
    ports:
      - "6379:6379"
    networks:
      - internal_network

  db_auth:
    image: postgres:15-alpine
    container_name: db_auth
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
      POSTGRES_DB:
    volumes:
      - pg_data_auth:/var/lib/postgresql/data
    networks:
      - internal_network

  # db_ventas:
  #   image: postgres:15-alpine
  #   container_name: db_ventas
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER:
  #     POSTGRES_PASSWORD:
  #     POSTGRES_DB:
  #   volumes:
  #     - pg_data_ventas:/var/lib/postgresql/data
  #   networks:
  #     - internal_network

  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: qdrant_server
    ports:
      - "6333:6333" # API REST (para que el host, ETL-IA y Comparador puedan acceder)
      - "6334:6334" # API gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal_network

  # ------------------------------------------------------------------
  # 2. API GATEWAY (Punto de entrada HTTP)
  # ------------------------------------------------------------------
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.dev # Usaremos un Dockerfile.dev similar al tuyo
      target: development
    container_name: gateway
    ports:
      - "3000:3000" # El puerto que NextJS consumirá
    volumes:
      - ./gateway:/usr/src/app
    #  - /usr/src/app/node_modules
    environment:
      # CRÍTICO: El host interno para los clientes de microservicios es 'redis'
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
      - db_auth # Dependencia lógica por si el Guard necesita el AuthDB
    networks:
      - internal_network
  # ------------------------------------------------------------------
  # 3. MICROSERVICIO AUTH (Login y Validación JWT)
  # ------------------------------------------------------------------
  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile.dev
      target: development
    container_name: auth
    volumes:
      - ./auth:/usr/src/app
    #  - /usr/src/app/node_modules
    environment:
      NODE_ENV: development
      # CONFIGURACIÓN DEL TRANSPORTADOR REDIS
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # CONFIGURACIÓN DE POSTGRES (usa el nombre del servicio 'db_auth')
      DB_HOST:
      DB_PORT: 5432
      DB_USER:
      DB_PASS:
      DB_NAME:
      # VARIABLES PARA JWT
      JWT_SECRET:
      JWT_EXPIRATION:
    depends_on:
      - redis
      - db_auth
    networks:
      - internal_network
  # ------------------------------------------------------------------
  # 4. MICROSERVICIO COMPARADOR (Tu proyecto refactorizado)
  #    Ahora corre como microservicio (Redis), no como HTTP.
  # ------------------------------------------------------------------
  price-comparator-backend:
    build:
      context: ./price-comparator/rag_ia_backend
      dockerfile: Dockerfile.dev
    container_name: price-comparator-backend
    # Ya no necesita exponer puerto HTTP, solo se comunica por Redis.
    volumes:
      - ./price-comparator/rag_ia_backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_URL: http://qdrant_db:6333
      GOOGLE_GEMINI_API_KEY: ""
      # ETL_SERVICE_URL: Ya no es necesario si usamos Redis para comunicación asíncrona
    depends_on:
      - redis
      - qdrant_db
    networks:
      - internal_network
  # ------------------------------------------------------------------
  # 6. MICROSERVICIO INDEXER (Orquestador ETL y Qdrant)
  # ------------------------------------------------------------------
  rag-etl-indexer:
    build:
      context: ./price-comparator/rag-etl-indexer # ⬅️ Carpeta del nuevo servicio
      dockerfile: Dockerfile.dev
      target: development
    container_name: rag_etl_indexer
    volumes:
      - ./price-comparator/rag-etl-indexer:/usr/src/app
    environment:
      NODE_ENV: development
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_URL: http://qdrant_db:6333 # Para la carga directa
      GOOGLE_GEMINI_API_KEY: ""
    depends_on:
      - redis
      - qdrant_db # Dependencia lógica de Qdrant
      - gescom-data-access # Dependencia lógica del ACL
    networks:
      - internal_network
  # ------------------------------------------------------------------
  # 7. MICROSERVICIO GESCOM DATA ACCESS (ACL)
  #    Se conecta al SQL Server externo de la red de la empresa.
  # ------------------------------------------------------------------
  gescom-data-access:
    build:
      context: ./gescom-data-access # ⬅️ Carpeta donde estará el código
      dockerfile: Dockerfile.dev
      target: development
    container_name: gescom_service
    volumes:
      - ./gescom-data-access:/usr/src/app
      # - /usr/src/app/node_modules # Descomentar si tienes problemas con node_modules
    environment:
      NODE_ENV: development
      # CONFIGURACIÓN DEL TRANSPORTADOR REDIS
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # 🚨 CONFIGURACIÓN DE SQL SERVER EXTERNO (GESCOM)
      GESCOM_DB_TYPE: # o sqlserver, dependiendo del driver
      GESCOM_DB_HOST: # ⬅️ IP SERVIDOR
      GESCOM_DB_PORT: # ⬅️ Puerto de SQL Server (típicamente 1433)
      GESCOM_DB_USER: # ⬅️ Usuario con SOLO LECTURA
      GESCOM_DB_PASS:
      GESCOM_DB_NAME:
    depends_on:
      - redis
    networks:
      - internal_network
    develop:
      watch:
        - action: sync
          path: ./gescom-data-access
          target: /usr/src/app
          ignore:
            - node_modules/
            - dist/
            - .git/
        - action: rebuild
          path: ./gescom-data-access/package.json

# ------------------------------------------------------------------
# VOLÚMENES Y REDES
# ------------------------------------------------------------------
volumes:
  pg_data_auth:
  pg_data_ventas:
  pg_data_price-comparator:
  qdrant_data:
    driver: local

networks:
  internal_network:
    driver: bridge
